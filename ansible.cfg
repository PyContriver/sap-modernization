[defaults]
inventory = inventory/demo, inventory/sap_mod
roles_path = roles
collections_paths = ./collections
host_key_checking = False
retry_files_enabled = False
stdout_callback = ansible.builtin.default

[callback_default]
result_format = yaml
interpreter_python = auto_silent
local_tmp = .ansible/tmp

[privilege_escalation]
# Day 0 playbooks use localhost — no sudo. Remote plays set become: true explicitly.
become = False
become_method = sudo

[inventory]
# script must be first: AAP/AWX injects /runner/inventory/hosts as a dynamic inventory script
enable_plugins = ansible.builtin.script, ansible.builtin.host_list, ansible.builtin.yaml, amazon.aws.aws_ec2

# Automation Hub — certified hashicorp.terraform (token via env var, not in git)
# export ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_TOKEN='...'
[galaxy]
server_list = automation_hub, release_galaxy

[galaxy_server.automation_hub]
url = https://console.redhat.com/api/automation-hub/content/published/
auth_url = https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token

[galaxy_server.release_galaxy]
url = https://galaxy.ansible.com/
ignore_errors = true
