---
- name: Resolve execution environment on controller
  block:
    - name: Query execution environments by name
      ansible.builtin.uri:
        url: "{{ lookup('env', 'CONTROLLER_HOST') }}/api/controller/v2/execution_environments/"
        method: GET
        headers: "{{ {'Authorization': 'Bearer ' + lookup('env', 'CONTROLLER_OAUTH_TOKEN')} if (lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default('') | length > 0) else omit }}"
        url_username: "{{ lookup('env', 'CONTROLLER_USERNAME') if (lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default('') | length == 0) else omit }}"
        url_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') if (lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default('') | length == 0) else omit }}"
        force_basic_auth: "{{ (lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default('') | length == 0) | bool }}"
        validate_certs: "{{ aap_verify_ssl }}"
        return_content: true
        status_code: 200
        timeout: 30
      register: _aap_ee_list
      no_log: true

    - name: Use configured execution environment
      when: >-
        (_aap_ee_list.json.results | default([]) | selectattr('name', 'equalto', aap_execution_environment) | list | length) > 0
      ansible.builtin.set_fact:
        aap_execution_environment_effective: "{{ aap_execution_environment }}"

    - name: Fall back to platform default execution environment
      when: >-
        (_aap_ee_list.json.results | default([]) | selectattr('name', 'equalto', aap_execution_environment) | list | length) == 0
      ansible.builtin.set_fact:
        aap_execution_environment_effective: Default execution environment

  rescue:
    - name: Use default EE when controller API is unreachable
      ansible.builtin.set_fact:
        aap_execution_environment_effective: Default execution environment

    - name: Warn when EE lookup failed
      ansible.builtin.debug:
        msg: >-
          Could not query execution environments on the controller; using
          '{{ aap_execution_environment_effective }}'. Re-run setup after the
          controller is reachable.

- name: Warn when custom EE is not built yet
  when: aap_execution_environment_effective != aap_execution_environment
  ansible.builtin.debug:
    msg: >-
      Execution environment '{{ aap_execution_environment }}' was not found on the
      controller; using '{{ aap_execution_environment_effective }}' for project and job
      templates. Build sap-mod-ee (Hub collections + boto3/pytfe) before running the
      SAP workflow jobs.
