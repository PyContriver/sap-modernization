---
- name: Require project SCM URL
  ansible.builtin.assert:
    that:
      - aap_project_scm_url | length > 0
    fail_msg: >-
      Set AAP_PROJECT_SCM_URL in .env.aap to your sap-modernization git URL
      (https://github.com/org/sap-modernization.git).

- name: Create or update SCM project
  ansible.controller.project:
    name: "{{ aap_project_name }}"
    description: SAP modernization PPT pipeline (Terraform + golden image + Db2)
    organization: "{{ aap_organization }}"
    scm_type: git
    scm_url: "{{ aap_project_scm_url }}"
    scm_branch: "{{ aap_project_scm_branch }}"
    scm_clean: true
    scm_delete_on_update: true
    scm_update_on_launch: "{{ aap_project_update_on_launch }}"
    scm_credential: "{{ aap_project_scm_credential if (aap_project_scm_credential | length > 0) else omit }}"
    default_environment: "{{ aap_execution_environment_effective }}"
    wait: "{{ aap_wait_for_project_sync | default(false) | bool }}"
    state: present
  register: _aap_project

- name: Sync project from SCM (optional; needs Hub token on controller for requirements.yml)
  when: aap_run_project_update | default(false) | bool
  ansible.controller.project_update:
    project: "{{ aap_project_name }}"
    organization: "{{ aap_organization }}"
    wait: "{{ aap_wait_for_project_sync | default(false) | bool }}"
  register: _aap_project_sync
  failed_when: false

- name: Report project sync result
  ansible.builtin.debug:
    msg: >-
      Project {{ aap_project_name }} sync status:
      {{ _aap_project_sync.status | default('skipped — sync manually in AAP after Hub/EE are ready') }}
