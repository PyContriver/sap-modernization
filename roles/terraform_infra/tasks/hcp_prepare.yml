---
# Shared HCP token + run variables (apply and rollback destroy)
- name: Resolve HCP Terraform API token
  ansible.builtin.set_fact:
    _hcp_tf_token: "{{ hcp_terraform_token | default(lookup('env', 'TF_TOKEN'), true) }}"
  no_log: true

- name: Build HCP run variables from terraform_variables
  when: hcp_terraform_run_variables | default([]) | length == 0
  ansible.builtin.set_fact:
    hcp_terraform_run_variables: "{{ terraform_variables | default({}) | terraform_hcp_vars }}"
