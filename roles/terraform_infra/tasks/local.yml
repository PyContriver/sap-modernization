---
# Local/community workflow: Terraform CLI + S3/DynamoDB remote state.
# State lives in S3; Ansible does not commit *.tfstate to git.
- name: Ensure Terraform project path exists
  ansible.builtin.stat:
    path: "{{ terraform_project_path }}"
  register: tf_project
  failed_when: not tf_project.stat.exists

- name: Apply Terraform configuration (CLI)
  cloud.terraform.terraform:
    project_path: "{{ terraform_project_path }}"
    state: "{{ terraform_state }}"
    force_init: "{{ terraform_force_init }}"
    init_reconfigure: true
    backend_config: "{{ terraform_backend_config }}"
    variables: "{{ terraform_variables | default({}) }}"
    complex_vars: "{{ terraform_complex_vars | default({}) }}"
    plan_file: "{{ terraform_plan_file | default(omit) }}"
    targets: "{{ terraform_targets }}"
    lock: true
  register: terraform_apply
  no_log: "{{ terraform_no_log | default(false) }}"

- name: Capture Terraform outputs for downstream roles
  cloud.terraform.terraform_output:
    project_path: "{{ terraform_project_path }}"
    backend_config: "{{ terraform_backend_config }}"
  register: terraform_outputs
  when: terraform_state == 'present'

- name: Publish Terraform outputs as facts
  ansible.builtin.set_fact:
    tf_builder_instance_id: "{{ terraform_outputs.outputs.builder_instance_id.value | default('') }}"
    tf_builder_public_ip: "{{ terraform_outputs.outputs.builder_public_ip.value | default('') }}"
    tf_builder_private_ip: "{{ terraform_outputs.outputs.builder_private_ip.value | default('') }}"
    tf_vpc_id: "{{ terraform_outputs.outputs.vpc_id.value | default('') }}"
    tf_image_pipeline_arn: "{{ terraform_outputs.outputs.image_pipeline_arn.value | default('') }}"
    tf_image_pipeline_name: "{{ terraform_outputs.outputs.image_pipeline_name.value | default('') }}"
    tf_public_subnet_id: "{{ (terraform_outputs.outputs.public_subnet_ids.value | default([]) | first) | default('') }}"
    tf_sap_instance_id: "{{ terraform_outputs.outputs.sap_instance_id.value | default('', true) | string }}"
    tf_db2_instance_id: "{{ terraform_outputs.outputs.db2_instance_id.value | default('', true) | string }}"
    tf_sap_private_ip: "{{ terraform_outputs.outputs.sap_private_ip.value | default('', true) | string }}"
    tf_db2_private_ip: "{{ terraform_outputs.outputs.db2_private_ip.value | default('', true) | string }}"
  when:
    - terraform_state == 'present'
    - terraform_outputs.outputs is defined
