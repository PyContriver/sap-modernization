---
- name: Read hashicorp.terraform collection version
  ansible.builtin.slurp:
    src: /usr/share/ansible/collections/ansible_collections/hashicorp/terraform/MANIFEST.json
  register: _hashicorp_tf_manifest

- name: Require hashicorp.terraform collection 2.x in execution environment
  ansible.builtin.assert:
    that:
      - >-
        {{ (_hashicorp_tf_manifest.content | b64decode | from_json).collection_info.version }}
        is version('2.0.0', '>=')
    fail_msg: >-
      sap-mod-ee must include hashicorp.terraform >= 2.0.0 (found
      {{ (_hashicorp_tf_manifest.content | b64decode | from_json).collection_info.version }}).
      Rebuild: ./scripts/build-aap-ee.sh
