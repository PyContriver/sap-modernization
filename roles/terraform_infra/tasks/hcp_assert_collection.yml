---
- name: Read hashicorp.terraform MANIFEST from standard EE collections path
  ansible.builtin.slurp:
    src: /usr/share/ansible/collections/ansible_collections/hashicorp/terraform/MANIFEST.json
  register: _hashicorp_tf_manifest

- name: Set hashicorp.terraform collection version fact
  ansible.builtin.set_fact:
    hashicorp_terraform_collection_version: >-
      {{ (_hashicorp_tf_manifest.content | b64decode | from_json).collection_info.version }}

- name: Require hashicorp.terraform 2.x in execution environment
  ansible.builtin.assert:
    that:
      - hashicorp_terraform_collection_version is version('2.0.0', '>=')
    fail_msg: >-
      hashicorp.terraform {{ hashicorp_terraform_collection_version }} found at
      /usr/share/ansible/collections — need >= 2.0.0. Rebuild and push EE:
      ./scripts/build-aap-ee.sh (EE pull policy is set to 'always' on the controller).
