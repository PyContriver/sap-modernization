---
# Galaxy collections for local install and AAP project SCM sync (no Hub token required).
# For certified Hub builds (EE / laptop with AH token), use requirements-aap.yml instead.
#
#   ansible-galaxy collection install -r requirements.yml
#
# Fallback without hashicorp.terraform: requirements-local.yml + terraform_driver: local
collections:
  - name: hashicorp.terraform
  - name: amazon.aws
    version: ">=7.0.0"
  - name: ansible.posix
    version: ">=1.5.0"
  # Optional — only needed if you use terraform_driver: local
  - name: cloud.terraform
    version: ">=2.0.0"

roles: []
