- name: Terraform infra for EC2 Image Builder path
  hosts: localhost
  connection: local
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/demo/aws.yml
  vars:
    golden_image_method: image_builder
  roles:
    - terraform_infra
